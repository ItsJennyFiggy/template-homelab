name: Sync Base Template
on:
  schedule:
    - cron: '0 0 * * 1' # Weekly on Monday at 00:00
  workflow_dispatch: # Allow manual trigger

permissions:
  id-token: write # Required for AWS OIDC authentication
  contents: write # Required to checkout and commit code
  pull-requests: write # Required to create/update pull requests

jobs:
  sync:
    name: Sync Upstream Rules & Workflows
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout target repository code
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Authenticate securely with AWS using OIDC
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: us-west-2

      # 3. Fetch GitHub App credentials from AWS SSM Parameter Store
      - name: Fetch GitHub App credentials from SSM
        id: fetch-ssm
        run: |
          CLIENT_ID=$(aws ssm get-parameter --name "/itsjennyfiggy/global/figgy_bot_github_app_client_id" --with-decryption --query "Parameter.Value" --output text)
          KEY=$(aws ssm get-parameter --name "/itsjennyfiggy/global/figgy_bot_github_app_private_key" --with-decryption --query "Parameter.Value" --output text)
          echo "::add-mask::$CLIENT_ID"
          echo "::add-mask::$KEY"
          echo "client-id=$CLIENT_ID" >> $GITHUB_OUTPUT
          echo "private-key<<EOF" >> $GITHUB_OUTPUT
          echo "$KEY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # 4. Generate Short-lived GitHub App Token
      - name: Generate GitHub App Token
        uses: actions/create-github-app-token@v1
        id: app-token
        with:
          client-id: ${{ steps.fetch-ssm.outputs.client-id }}
          private-key: ${{ steps.fetch-ssm.outputs.private-key }}

      # 5. Run Upstream Sync Action
      - name: Run Upstream Sync Action
        uses: ItsJennyFiggy/action-base-sync@v1
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          base-repo: 'ItsJennyFiggy/template-base'
          base-branch: 'main'
          sync-path: '.agents'
